<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聖經闖關遊戲 - 復活彩蛋版</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#cfefff,#fff8c6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90vw;
max-width:1000px;
aspect-ratio:16/9;
background:white;
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
position:relative;
overflow:hidden;
}

h1{text-align:center;margin:5px;}
.stage-title{text-align:center;font-size:22px;margin-bottom:10px;}

.grid{
flex:1;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.card{
background:#87CEFA;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
cursor:pointer;
}

.card.open{background:#fff;}

.modal{
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.modal-content{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
}

/* ⭐ 星星動畫 */
.star{
position:absolute;
font-size:30px;
animation:fall 2s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(500px);}
}

/* 🌄 復活場景 */
.resurrection{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
background:radial-gradient(circle,#fff,#ffd700);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:20;
}

.stone{
font-size:80px;
animation:roll 2s forwards;
}

@keyframes roll{
0%{transform:translateX(0);}
100%{transform:translateX(200px);}
}

.angel{
font-size:70px;
opacity:0;
animation:fadeIn 2s 1.5s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

</style>
</head>

<body>

<div class="container">

<h1>聖經闖關遊戲 🎮</h1>
<div class="stage-title" id="stageTitle"></div>

<div class="grid" id="game"></div>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<h2 id="modalText"></h2>
<button onclick="nextStage()">下一關 ➜</button>
</div>
</div>

<!-- 🌄 復活動畫 -->
<div class="resurrection" id="resurrection">
<div class="stone">🪨 ➜</div>
<div style="font-size:80px;">🪦</div>
<div class="angel">👼</div>
<h1>✨ 祂復活了！ ✨</h1>
</div>

<script>

function speak(text){
let msg=new SpeechSynthesisUtterance(text)
msg.lang="zh-TW"
msg.rate=0.9
speechSynthesis.speak(msg)
}

const stages=[
{
title:"🟡 最後的晚餐",
data:[{icon:"🍞",voice:"最後的晚餐"},
{icon:"🍇",voice:"聖餐"},
{icon:"🧺",voice:"洗腳"}]
},
{
title:"🟢 客西馬尼園",
data:[{icon:"🙏",voice:"禱告"},
{icon:"😴",voice:"睡著"},
{icon:"💋",voice:"親吻"},
{icon:"🐓",voice:"雞叫"}]
},
{
title:"🔴 十字架與墳墓",
data:[{icon:"✝️",voice:"十字架"},
{icon:"🪦",voice:"墳墓"},
{icon:"🪨",voice:"石頭"},
{icon:"👑",voice:"王冠"}]
}
]

let currentStage=0, cards=[], first=null, second=null, lock=false
const game=document.getElementById("game")

function loadStage(){
let stage=stages[currentStage]
document.getElementById("stageTitle").innerText=stage.title
cards=[...stage.data,...stage.data].sort(()=>Math.random()-0.5)
createBoard()
speak(stage.title)
}

function createBoard(){
game.innerHTML=""
cards.forEach(item=>{
let div=document.createElement("div")
div.className="card"
div.dataset.icon=item.icon
div.dataset.voice=item.voice
div.innerText="⭐"

div.onclick=()=>{
if(lock || div.classList.contains("open")) return
div.classList.add("open")
div.innerText=item.icon
speak(item.voice)

if(!first){first=div;return}
second=div

if(first.dataset.icon===second.dataset.icon){
first=null;second=null
checkWin()
}else{
lock=true
setTimeout(()=>{
first.classList.remove("open")
second.classList.remove("open")
first.innerText="⭐"
second.innerText="⭐"
first=null;second=null
lock=false
},800)
}
}
game.appendChild(div)
})
}

function checkWin(){
if(document.querySelectorAll(".open").length===cards.length){
setTimeout(()=>{
if(currentStage===stages.length-1){
playResurrection()
}else{
document.getElementById("modal").style.display="flex"
document.getElementById("modalText").innerText="👏 太棒了！"
speak("完成這一關")
}
},300)
}
}

function playResurrection(){
let scene=document.getElementById("resurrection")
scene.style.display="flex"

speak("耶穌復活了")

// ⭐ 星星效果
for(let i=0;i<20;i++){
let s=document.createElement("div")
s.className="star"
s.innerText="⭐"
s.style.left=Math.random()*100+"%"
scene.appendChild(s)
}
}

function nextStage(){
document.getElementById("modal").style.display="none"
currentStage++
if(currentStage>=stages.length) currentStage=0
first=null;second=null;lock=false
loadStage()
}

loadStage()

</script>

</body>
</html>
